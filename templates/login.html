<!DOCTYPE html>
<html>
<head>
    <title>Login - CBT Anti-Cheating</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>CBT Login</h2>
        <form method="POST">
            <input type="text" name="nama" placeholder="Nama Lengkap" required>
            <input type="text" name="nim" placeholder="NIM" required>
            <button type="submit">Masuk Ujian</button>
        </form>
        <p style="font-size: 0.8rem; color: #666; margin-top: 1rem;">* Gunakan NIM 'admin' untuk akses dashboard.</p>
    </div>
</body>
</html>
